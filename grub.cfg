# GRUB Configuration for WindogeOS
# This configuration file tells GRUB to load WindogeOS in graphics mode

set default="0"
set timeout=5

# Set graphics mode before loading the kernel
insmod gfxterm
insmod vbe
set gfxmode=1024x768x32
terminal_output gfxterm

# Boot entry for WindogeOS
menuentry "WindogeOS" {
    # Load the kernel with graphics mode enabled
    multiboot /boot/windoge.bin
    boot
}

# Alternative entry with fallback
menuentry "WindogeOS (Text Mode)" {
    multiboot /boot/windoge.bin
    boot
}
